name: Awesome Lint

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'
  workflow_dispatch:

concurrency:
  group: awesome-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run awesome-lint
        run: npx awesome-lint README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
